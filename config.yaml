# =============================================================
# AgenticAI for BO — Configuration
# =============================================================

# SAP Business Objects Log Settings
log_settings:
  # Log directories to scan (supports multiple directories)
  # Linux paths (typical SAP BO installation):
  log_directories:
    - "/data/sap_bobj/enterprise_xi40/logging"         # SAP BO core logs
    - "/data/sap_bobj/tomcat/logs"                      # Tomcat logs
    # - "/opt/sap_bobj/enterprise_xi40/java/logs"      # Java component logs
  # Windows alternatives:
  # log_directories:
  #   - "C:/Program Files (x86)/SAP BusinessObjects/SAP BusinessObjects Enterprise XI 4.0/logging"
  #   - "C:/Program Files (x86)/SAP BusinessObjects/tomcat/logs"

  # Legacy single-directory setting (overridden by log_directories if both exist)
  log_directory: "/data/sap_bobj/enterprise_xi40/logging"

  # File extensions to scan for
  log_extensions:
    - ".log"
    - ".glf"
    - ".trc"
    - ".txt"         # Tomcat access logs (localhost_access_log.*.txt)
    - ".out"         # catalina.out

  # Maximum number of log files to process per run
  max_files: 500

  # Only process log files modified within the last N days (0 = no limit)
  max_age_days: 7

  # Maximum lines per file to read (0 = unlimited)
  max_lines_per_file: 0

  # Encoding for reading log files
  encoding: "utf-8"
  fallback_encoding: "latin-1"

# Error Detection Settings
detection:
  # Minimum severity to report: DEBUG, INFO, WARNING, ERROR, CRITICAL
  min_severity: "WARNING"

  # Skip duplicate errors (same message from same pattern)
  deduplicate: true

  # Maximum number of errors to report (most recent first, 0 = unlimited)
  max_errors: 25

  # Maximum number of errors to send to AI per batch
  ai_batch_size: 10

  # Include surrounding context lines for each error
  context_lines_before: 3
  context_lines_after: 3

# AI Engine Settings
ai_settings:
  # Set to false to disable AI and use template-based solutions only
  enabled: false

  # Provider: "openai" or "gemini"
  provider: "gemini"

  # Temperature for response generation (0.0 = deterministic, 1.0 = creative)
  temperature: 0.3

  # Maximum tokens for AI response
  max_tokens: 2048

# Report Settings
report:
  # Output format: "markdown", "json", "console"
  output_format: "console"

  # Output directory for file-based reports
  output_directory: "./reports"

  # Include raw log lines in the report
  include_raw_logs: true

  # Maximum solutions to show per error
  max_solutions_per_error: 3
